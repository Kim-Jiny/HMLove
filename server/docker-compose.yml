services:
  db:
    image: postgres:16-alpine
    container_name: hmlove-db
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=hmlove
      - POSTGRES_USER=hmlove
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hmlove -d hmlove"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app-network

  minio:
    image: minio/minio
    container_name: hmlove-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - app-network

  minio-init:
    image: minio/mc
    container_name: hmlove-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing myminio/hmlove;
      mc anonymous set download myminio/hmlove;
      exit 0;
      "
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    networks:
      - app-network

  love:
    build: .
    container_name: love
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      - DATABASE_URL=postgresql://hmlove:${DB_PASSWORD}@db:5432/hmlove?sslmode=disable
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET=hmlove
      - STORAGE_PUBLIC_URL=${STORAGE_PUBLIC_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - FIREBASE_SERVICE_ACCOUNT=./firebase-service-account.json
      - NCP_MAP_CLIENT_ID=${NCP_MAP_CLIENT_ID}
      - NCP_MAP_CLIENT_SECRET=${NCP_MAP_CLIENT_SECRET}
      - PORT=3000
      - NODE_ENV=production
    expose:
      - "3000"
    networks:
      - app-network

volumes:
  pgdata:
  minio_data:

networks:
  app-network:
    external: true